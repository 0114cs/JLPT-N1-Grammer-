<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>N1 문법 SRS 퀴즈앱</title>
<style>
:root{--bg:#f5f1eb;--card:#fff;--text:#201b16;--muted:#746b60;--accent:#5b63c7;--line:#e5dcd2;--ok:#168a54;--bad:#c0392b;--warn:#b26b00;--soft:#f7f4ef;--shadow:0 14px 34px rgba(55,40,20,.11)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:radial-gradient(circle at 0 0,#fff7e3,var(--bg) 48%);color:var(--text)}
.app{max-width:980px;margin:0 auto;padding:24px 16px 70px}h1{margin:0;font-size:28px;letter-spacing:-.04em}.sub{color:var(--muted);font-size:14px;margin-top:6px;line-height:1.5}
.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.badge{background:rgba(255,255,255,.83);border:1px solid var(--line);border-radius:999px;padding:8px 11px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;cursor:pointer}.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.panel{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:18px;padding:12px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;box-shadow:0 5px 16px rgba(0,0,0,.04)}
button,select{font:inherit}button,select{border:1px solid var(--line);border-radius:13px;padding:10px 12px;background:#fff;color:var(--text)}button{cursor:pointer;transition:.15s}button:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(0,0,0,.08)}.primary{background:var(--accent);color:white;border-color:var(--accent)}.danger{color:var(--bad)}.warn{color:var(--warn)}
.card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:var(--shadow)}.meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px;margin-bottom:14px;flex-wrap:wrap}.pill{padding:6px 10px;border-radius:999px;background:#f0ebe4;color:#6b5f52}
.sentence{font-size:29px;line-height:1.6;letter-spacing:-.02em;margin:12px 0 22px;word-break:keep-all}.blank{display:inline-block;min-width:84px;border-bottom:4px solid var(--accent);transform:translateY(-3px);margin:0 4px}
.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.choice{text-align:left;font-size:20px;padding:16px 18px;border:2px solid var(--line);border-radius:18px;background:#fff}.choice.correct{border-color:rgba(22,138,84,.55);background:#eaf8f1;color:var(--ok)}.choice.wrong{border-color:rgba(192,57,43,.55);background:#fff0ee;color:var(--bad)}.choice:disabled{cursor:default;transform:none;box-shadow:none}
.explain{display:none;margin-top:18px;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:18px;line-height:1.65}.explain.show{display:block}.explain h3{margin:0 0 8px}.jp{font-size:19px;margin:8px 0}.ko{margin:8px 0}.note{color:var(--muted)}
.footer{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.progressWrap{height:10px;background:#e8ded2;border-radius:999px;overflow:hidden;margin-top:16px}.progress{height:100%;width:0;background:var(--accent);transition:.3s}
.box{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:14px}.listItem{border-top:1px solid var(--line);padding:12px 0}.listItem:first-child{border-top:0}.small{font-size:13px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.hidden{display:none!important}
@media(max-width:720px){.top{display:block}.stats{justify-content:flex-start;margin-top:12px}.sentence{font-size:23px}.choices,.grid{grid-template-columns:1fr}.card{padding:19px;border-radius:22px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div><h1>N1 문법 SRS 퀴즈</h1><div class="sub">오답 자동 누적, 1일→3일→7일→14일 복습, 비슷한 문법 구별 문제, 자동 새 예문, JLPT 시험 모드.</div></div>
  <div class="stats"><div class="badge">점수 <b id="score">0</b></div><div class="badge">문항 <b id="count">0</b>/<span id="total">0</span></div><div class="badge">정답률 <b id="rate">0%</b></div><div class="badge">오늘 복습 <b id="dueCount">0</b></div></div></div>

  <div class="tabs">
    <button class="tab active" data-mode="learn">학습</button>
    <button class="tab" data-mode="review">오늘 복습</button>
    <button class="tab" data-mode="similar">구별 문제</button>
    <button class="tab" data-mode="generate">새 예문 생성</button>
    <button class="tab" data-mode="exam">JLPT 시험</button>
    <button class="tab" data-mode="note">오답노트</button>
  </div>

  <div class="panel" id="panel"></div>

  <main class="card" id="quizCard">
    <div class="meta"><span id="modeLabel">학습 모드</span><span class="pill" id="sourceTag">출처</span><span class="pill" id="groupTag">그룹</span></div>
    <div class="sentence" id="sentence"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="footer"><button class="primary" id="nextBtn">다음 문제</button><button id="showBtn">정답 해설 보기</button><button id="againBtn">이 문제 다시</button></div>
    <div class="progressWrap"><div class="progress" id="progress"></div></div>
  </main>

  <section class="box hidden" id="noteBox"></section>
</div>

lanation": "「Vてからというもの」는 어떤 일을 계기로 그 후 상태가 계속됨을 나타낸다.", "source": "PDF 예문 기반", "choices": ["てやまない", "からというもの", "に際して", "でなくてなんだろう"], "group": "일반 N1 문법"}, {"grammar": "でなくてなんだろう", "sentence": "命をかけて人を救うことが、勇気＿＿。", "translation": "목숨을 걸고 사람을 구하는 것이 용기가 아니고 무엇이겠는가.", "explanation": "「〜でなくてなんだろう」는 ‘~가 아니고 무엇이겠는가’라는 강한 단정이다.", "source": "PDF 예문 기반", "choices": ["といったところだ", "もさることながら", "でなくてなんだろう", "どころか"], "group": "일반 N1 문법"}, {"grammar": "じゃあるまいし", "sentence": "子ども＿＿、それくらい自分で判断できるはずだ。", "translation": "어린아이도 아니고 그 정도는 스스로 판단할 수 있을 것이다.", "explanation": "「Nじゃあるまいし」는 ‘~도 아니고’라는 뜻으로 상대를 타박할 때도 쓰인다.", "source": "PDF 예문 기반", "choices": ["に至るまで", "いらっしゃる", "じゃあるまいし", "を余儀なくされる"], "group": "일반 N1 문법"}, {"grammar": "てやまない", "sentence": "皆様のご成功を心から願っ＿＿。", "translation": "여러분의 성공을 진심으로 바라마지 않습니다.", "explanation": "「願ってやまない／信じてやまない」처럼 강한 지속적 마음을 나타낸다.", "source": "PDF 예문 기반", "choices": ["あっての", "てやまない", "のもとで", "たるもの"], "group": "일반 N1 문법"}, {"grammar": "と相まって", "sentence": "SNSでの話題性が商品の質＿＿、大ヒットにつながった。", "translation": "SNS에서의 화제성이 상품의 질과 맞물려 대히트로 이어졌다.", "explanation": "「Aと相まって」는 A와 다른 요인이 결합해 결과를 낳을 때 쓴다.", "source": "새 예문", "choices": ["からというもの", "がてら", "と相まって", "に先立って"], "group": "일반 N1 문법"}, {"grammar": "とあって", "sentence": "十年ぶりの開催＿＿、会場には多くの人が集まった。", "translation": "10년 만의 개최라서 행사장에는 많은 사람이 모였다.", "explanation": "「とあって」는 ‘~라고 해서, ~인 만큼’이라는 이유를 나타낸다.", "source": "PDF 예문 기반", "choices": ["とあって", "だけあって", "ものだから", "ゆえに"], "group": "이유 표현 구별"}, {"grammar": "とあれば", "sentence": "大切な友人の頼み＿＿、断るわけにはいかない。", "translation": "소중한 친구의 부탁이라면 거절할 수 없다.", "explanation": "「とあれば」는 ‘~라면, ~라고 한다면’이라는 조건을 나타낸다.", "source": "새 예문", "choices": ["いかんでは", "さえ〜ば", "ものなら", "とあれば"], "group": "조건·경우 구별"}, {"grammar": "といい〜といい", "sentence": "味＿＿値段＿＿、この店は学生にぴったりだ。", "translation": "맛도 가격도 이 가게는 학생들에게 딱 맞다.", "explanation": "「AといいBといい」는 두 가지 측면을 들어 전체 평가를 나타낸다.", "source": "새 예문", "choices": ["にあたって", "といい〜といい", "がてら", "最中に"], "group": "일반 N1 문법"}, {"grammar": "といったところだ", "sentence": "修理にかかる時間は、長くても三日＿＿。" "}, {"grammar": "にあたって", "sentence": "新サービスを始める＿＿、利用規約を見直した。", "translation": "새 서비스를 시작함에 있어서 이용약관을 재검토했다.", "explanation": "「にあたって」는 중요한 일을 시작하거나 맞이할 때 쓴다.", "source": "새 예문", "choices": ["いただく", "折に", "ごとく", "にあたって"], "group": "일반 N1 문법"}, {"grammar": "における", "sentence": "現代社会＿＿情報リテラシーは非常に重要だ。", "translation": "현대 사회에 있어서 정보 리터러시는 매우 중요하다.", "explanation": "「における」는 ‘~에서의, ~에 있어서의’라는 격식 표현이다.", "source": "새 예문", "choices": ["に沿って", "における", "に応じて", "に基づいて"], "group": "관계·기준 표현 구별"}, {"grammar": "に応じて", "sentence": "参加人数＿＿、会場の大きさを変更します。", "translation": "참가 인원에 따라 행사장 크기를 변경합니다.", "explanation": "「に応じて」는 상황·조건에 맞추어 달라짐을 나타낸다.", "source": "새 예문", "choices": ["に応じて", "に基づいて", "における", "にとって"], "group": "관계·기준 표현 구별"}, {"grammar": "に限らず", "sentence": "このサービスは学生＿＿、誰でも利用できる。", "translation": "이 서비스는 학생뿐만 아니라 누구나 이용할 수 있다.", "explanation": "「に限らず」는 ‘~에 한정하지 않고’라는 뜻이다.", "source": "새 예문", "choices": ["をめぐって", "きらいがある", "に限らず", "からある"], "group": "일반 N1 문법"}, {"grammar": "に決まっている", "sentence": "そんな生活を続けていたら、体を壊す＿＿。", "translation": "그런 생활을 계속하면 몸을 망치는 것이 당연하다.", "explanation": "「に決まっている」는 화자의 강한 확신을 나타낸다.", "source": "새 예문", "choices": ["ことだし", "に違いない", "に決まっている", "に至るまで"], "group": "일반 N1 문법"}, {"grammar": "に際して", "sentence": "入学＿＿、必要な書類を提出してください。", "translation": "입학에 즈음하여 필요한 서류를 제출해 주세요.", "explanation": "「に際して」는 ‘~할 때, ~에 즈음하여’라는 격식 표현이다.", "source": "새 예문", "choices": ["をおいてほかにない", "に際して", "まみれ", "わりには"], "group": "일반 N1 문법"}, {"grammar": "に先立って", "sentence": "講演会に＿＿、資料を配布した。", "translation": "강연회에 앞서 자료를 배부했다.", "explanation": "「に先立って」는 ‘~에 앞서서, ~하기 전에’라는 뜻이다.", "source": "PDF 예문 기반", "choices": ["に決まっている", "はずがない", "に先立って", "拝聴する"], "group": "일반 N1 문법"}, {"grammar": "に従って", "sentence": "年齢が上がる＿＿、考え方も少しずつ変わってきた。", "translation": "나이가 들면서 사고방식도 조금씩 변해 왔다.", "explanation": "「に従って」는 변화에 따라 다른 변화가 함께 일어남을 나타낸다.", "source": "새 예문", "choices": ["にとって", "に対して", "に従って", "に応じて"], "group": "관계·기준 표현 구별"}, {"grammar": "にしたら", "sentence": "初心者＿＿、この説明は少し難しすぎる。", "translation": "초보자 {B}。", "‘~하자마자’라는 문어적 표현이다."]], "が早いか": [["{A}＿＿、{B}。", "동작이 끝나자마자 다음 동작이 매우 빠르게 일어남을 나타낸다."]], "だけあって": [["{A}＿＿、{B}。", "과연 ~인 만큼 그에 걸맞은 결과가 있음을 나타낸다."]], "からにほかならない": [["{A}のは、{B}＿＿。", "결과의 이유를 강하게 단정한다."]], "に関して": [["{A}＿＿、{B}。", "어떤 주제에 관하여 말할 때 쓴다."]], "に応じて": [["{A}＿＿、{B}。", "조건이나 상황에 맞추어 뒤 내용이 달라질 때 쓴다."]], "を問わず": [["{A}＿＿、{B}。", "조건을 불문하고 모두 해당함을 나타낸다."]], "にかかわらず": [["{A}＿＿、{B}。", "앞 조건과 관계없이 뒤 내용이 성립함을 나타낸다."]], "をものともせず": [["{A}＿＿、{B}。", "장애나 반대를 개의치 않고 행동함을 나타낸다."]], "を余儀なくされる": [["{A}により、{B}＿＿。", "외부 사정 때문에 어쩔 수 없이 그렇게 됨을 나타낸다."]], "おそれがある": [["このままでは、{A}＿＿。", "좋지 않은 일이 일어날 가능성을 나타낸다."]], "きらいがある": [["彼は{A}＿＿。", "좋지 않은 경향이 있음을 나타낸다."]], "ならでは": [["{A}＿＿{B}を楽しんだ。", "그 대상만이 가진 고유성을 나타낸다."]]}, "fragments": {"A": ["大学院生なので忙しい", "日本語が好きだ", "予約はした", "経験は浅い", "有名な店だ", "台風が近づいている", "参加人数", "年齢や国籍", "周囲の反対", "大雨", "新しい制度", "努力を続けた", "授業内容", "スマホを長時間使う", "忙しい", "説明を受けた", "家に着いた", "ドアを開けた", "会議が終わった", "京都", "その地方"], "B": ["趣味の時間も大切にしたい", "漢字が得意なわけではない", "本当に行けるか分からない", "慎重に判断すべきだ", "味は普通だった", "試合は中止", "会場の大きさを変更します", "誰でも参加できます", "彼女は夢を追い続けた", "イベントは延期", "さまざまな意見が出ている", "成功した", "問題が出題される", "目が悪くなる", "連絡くらいはできたはずだ", "まだ理解できなかった", "すぐに寝てしまった", "冷たい風が入ってきた", "参加者が一斉に立ち上がった", "落ち着いた雰囲気", "独特の味"]}, "version": "3.0"}</script>
<script>
const APP = JSON.parse(document.getElementById("app-data").textContent);
const ITEMS = APP.items;
const TEMPLATES = APP.templates;
const FRAG = APP.fragments;
const LS = "n1_srs_state_v3";
const SRS = [1,3,7,14];

let state = loadState();
let mode = "learn", queue = [], idx = 0, score = 0, answered = 0, current = null, answeredThis=false, examSize=10;

function $(id){return document.getElementById(id)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function today(){return new Date().toISOString().slice(0,10)}
function addDays(n){let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function loadState(){try{return JSON.parse(localStorage.getItem(LS))||{cards:{},wrongs:[],history:[]}}catch(e){return{cards:{},wrongs:[],history:[]}}}
function save(){localStorage.setItem(LS,JSON.stringify(state)); updateDue()}
function card(g){return state.cards[g]||(state.cards[g]={level:0,due:today(),seen:0,correct:0,wrong:0})}
function updateDue(){let n=ITEMS.filter(x=>(card(x.grammar).due<=today())).length;$("dueCount").textContent=n}
function mask(s){return s.replace("＿＿",'<span class="blank"></span>')}
function complete(q){return q.sentence.replace("＿＿", q.grammar)}
function setTabs(){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.mode===mode))}
function resetRun(q){queue=q;idx=0;score=0;answered=0;renderPanel();render()}
function sample(n, arr){return shuffle(arr).slice(0,n)}
function startLearn(){mode="learn";setTabs();resetRun(shuffle(ITEMS))}
function startReview(){mode="review";setTabs();let due=ITEMS.filter(x=>card(x.grammar).due<=today());resetRun(shuffle(due.length?due:ITEMS.slice(0,10)))}
function startSimilar(group=null){mode="similar";setTabs();let groups=[...new Set(ITEMS.map(x=>x.group))].filter(g=>g!=="일반 N1 문법");let g=group||groups[0];let arr=ITEMS.filter(x=>x.group===g);resetRun(shuffle(arr));setTimeout(()=>{$("similarSelect").value=g},0)}
function startExam(n=10){mode="exam";examSize=n;setTabs();resetRun(sample(n, ITEMS))}
function randomFrom(a){return a[Math.floor(Math.random()*a.length)]}
function makeGenerated(grammar=null){
  const keys=Object.keys(TEMPLATES); let g=grammar||randomFrom(keys);
  const base=ITEMS.find(x=>x.grammar===g)||{grammar:g,translation:"자동 생성 예문입니다.",group:"자동 생성",source:"자동 생성"};
  const [tpl, exp]=randomFrom(TEMPLATES[g]);
  let A=randomFrom(FRAG.A), B=randomFrom(FRAG.B);
  let sentence=tpl.replace("{A}",A).replace("{B}",B);
  let translation = "자동 생성 예문: 문맥상 「"+g+"」가 가장 자연스럽게 들어갑니다.";
  let wrongPool = ITEMS.filter(x=>x.grammar!==g && (x.group===base.group || Object.keys(TEMPLATES).includes(x.grammar))).map(x=>x.grammar);
  let choices = shuffle(sample(3, wrongPool.length?wrongPool:ITEMS.map(x=>x.grammar).filter(x=>x!==g)).concat([g]));
  return {grammar:g,sentence,translation,explanation:exp,source:"새 예문 자동 생성",group:base.group,choices};
}
function startGenerate(grammar=null){mode="generate";setTabs();let arr=Array.from({length:50},()=>makeGenerated(grammar));resetRun(arr)}
function showNotes(){mode="note";setTabs();renderPanel();$("quizCard").classList.add("hidden");let box=$("noteBox");box.classList.remove("hidden");let wrongs=state.wrongs.slice().reverse();if(!wrongs.length){box.innerHTML="<b>오답 없음</b><div class='small'>틀린 문제가 생기면 여기에 자동 저장됩니다.</div>";return}
box.innerHTML=`<b>오답노트 ${wrongs.length}개</b><div class="small">브라우저에 자동 저장됩니다. 갤럭시에서도 같은 브라우저라면 유지됩니다.</div>`+wrongs.map(w=>`<div class="listItem"><div>${esc(w.sentence.replace("＿＿","（　　）"))}</div><div class="small">정답: ${esc(w.grammar)} / 선택: ${esc(w.user)}</div><div class="small">해석: ${esc(w.translation)}</div><div class="small">다음 복습: ${esc(card(w.grammar).due)} · 단계 ${card(w.grammar).level}</div></div>`).join("")}
function renderPanel(){
  const p=$("panel"); $("noteBox").classList.add("hidden"); $("quizCard").classList.remove("hidden");
  if(mode==="learn") p.innerHTML=`<select id="sourceFilter"><option value="all">전체</option><option value="pdf">PDF 예문 기반</option><option value="new">새 예문</option></select><button class="primary" onclick="filterLearn()">학습 시작</button><button onclick="clearProgress()" class="danger">저장 기록 초기화</button>`;
  if(mode==="review") p.innerHTML=`<button class="primary" onclick="startReview()">오늘 복습 다시 불러오기</button><span class="small">정답이면 다음 복습일이 1→3→7→14일 뒤로 밀리고, 오답이면 내일 다시 나옵니다.</span>`;
  if(mode==="similar"){let groups=[...new Set(ITEMS.map(x=>x.group))].filter(g=>g!=="일반 N1 문법");p.innerHTML=`<select id="similarSelect">${groups.map(g=>`<option>${esc(g)}</option>`).join("")}</select><button class="primary" onclick="startSimilar(document.getElementById('similarSelect').value)">이 그룹으로 출제</button><span class="small">비슷한 문법끼리 선택지로 묶여 나옵니다.</span>`}
  if(mode==="generate"){let keys=Object.keys(TEMPLATES);p.innerHTML=`<select id="genSelect"><option value="">랜덤 문법</option>${keys.map(g=>`<option>${esc(g)}</option>`).join("")}</select><button class="primary" onclick="startGenerate(document.getElementById('genSelect').value||null)">새 예문 생성</button><span class="small">인터넷 없이 브라우저 안에서 템플릿 기반으로 새 문장을 계속 만듭니다.</span>`}
  if(mode==="exam") p.innerHTML=`<button class="primary" onclick="startExam(10)">10문제</button><button class="primary" onclick="startExam(20)">20문제</button><button class="primary" onclick="startExam(50)">50문제</button><span class="small">시험 모드는 끝나면 점수와 오답노트가 표시됩니다.</span>`;
}
function filterLearn(){let v=$("sourceFilter").value;let arr=ITEMS.filter(x=>v==="all"|| (v==="pdf"?x.source.includes("PDF"):x.source.includes("새")));resetRun(shuffle(arr))}
function render(){
  updateDue(); updateStats();
  $("explain").classList.remove("show"); $("explain").innerHTML=""; $("nextBtn").style.display="inline-block"; $("showBtn").style.display="inline-block"; answeredThis=false;
  if(!queue.length){$("sentence").innerHTML="문제가 없습니다."; $("choices").innerHTML=""; $("sourceTag").textContent=""; $("groupTag").textContent=""; return}
  if(idx>=queue.length){finish();return}
  current=queue[idx]; $("modeLabel").textContent=modeLabel(); $("sourceTag").textContent=current.source; $("groupTag").textContent=current.group||"일반";
  $("sentence").innerHTML=mask(current.sentence);
  let ch=current.choices?shuffle(current.choices):buildChoices(current);
  $("choices").innerHTML=ch.map(c=>`<button class="choice" data-choice="${esc(c)}">${esc(c)}</button>`).join("");
  document.querySelectorAll(".choice").forEach(b=>b.addEventListener("click",()=>choose(b.dataset.choice)));
  updateStats();
}
function buildChoices(q){let same=ITEMS.filter(x=>x.group===q.group&&x.grammar!==q.grammar).map(x=>x.grammar);let others=ITEMS.filter(x=>x.grammar!==q.grammar&&!same.includes(x.grammar)).map(x=>x.grammar);return shuffle(sample(3,same.concat(others)).concat([q.grammar]))}
function modeLabel(){return ({learn:"학습 모드",review:"오늘 복습",similar:"구별 문제",generate:"새 예문 생성",exam:"JLPT 시험 모드"})[mode]||""}
function choose(choice){
  if(answeredThis)return; answeredThis=true; answered++;
  let ok=choice===current.grammar; if(ok) score++;
  document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.choice===current.grammar)b.classList.add("correct");else if(b.dataset.choice===choice)b.classList.add("wrong")});
  updateSRS(current, ok, choice); showExplain(ok, choice); updateStats();
}
function updateSRS(q, ok, user){
  let c=card(q.grammar); c.seen++; if(ok){c.correct++; c.level=Math.min(4,c.level+1); c.due=addDays(SRS[Math.max(0,c.level-1)]);} else {c.wrong++; c.level=0; c.due=addDays(1); state.wrongs.push({...q,user,date:today()}); if(state.wrongs.length>500)state.wrongs=state.wrongs.slice(-500);}
  state.history.push({g:q.grammar, ok, date:today(), mode}); if(state.history.length>1000)state.history=state.history.slice(-1000); save();
}
function showExplain(ok=null,user=null){
  document.querySelectorAll(".choice").forEach(b=>{if(b.dataset.choice===current.grammar)b.classList.add("correct"); b.disabled=true});
  $("explain").innerHTML=`<h3>${ok===null?"정답 해설":ok?"정답!":"오답"}</h3><div class="jp">${esc(complete(current))}</div><div class="ko"><b>해석:</b> ${esc(current.translation)}</div><div><b>정답:</b> ${esc(current.grammar)}${user&&!ok?` <span class="small">/ 내가 고른 답: ${esc(user)}</span>`:""}</div><div class="note">${esc(current.explanation)}</div><div class="small">SRS: 다음 복습일 ${esc(card(current.grammar).due)} · 단계 ${card(current.grammar).level}</div>`;
  $("explain").classList.add("show");
}
function finish(){
  $("sentence").innerHTML=`완료! 점수 ${score}/${answered}`;
  $("choices").innerHTML=""; $("sourceTag").textContent="끝"; $("groupTag").textContent=modeLabel(); $("showBtn").style.display="none"; $("nextBtn").style.display="none"; $("progress").style.width="100%";
  if(mode==="exam"){showExamReview()}
}
function showExamReview(){
  let recent=state.wrongs.slice(-answered).reverse();
  $("noteBox").classList.remove("hidden");
  $("noteBox").innerHTML=`<b>시험 결과: ${score}/${answered} (${answered?Math.round(score/answered*100):0}%)</b>`+(recent.length?recent.map(w=>`<div class="listItem"><div>${esc(w.sentence.replace("＿＿","（　　）"))}</div><div class="small">정답: ${esc(w.grammar)} / 선택: ${esc(w.user)}</div><div class="small">해석: ${esc(w.translation)}</div></div>`).join(""):"<div class='small'>이번 시험 오답 없음.</div>");
}
function updateStats(){$("score").textContent=score;$("count").textContent=Math.min(idx+1,queue.length);$("total").textContent=queue.length;$("rate").textContent=answered?Math.round(score/answered*100)+"%":"0%";$("progress").style.width=queue.length?`${Math.min(idx,queue.length)/queue.length*100}%`:"0%"}
function clearProgress(){if(confirm("오답노트와 SRS 기록을 모두 지울까요?")){localStorage.removeItem(LS);state=loadState();startLearn()}}
$("nextBtn").addEventListener("click",()=>{idx++;render()});
$("showBtn").addEventListener("click",()=>{if(!answeredThis){answeredThis=true;answered++;updateSRS(current,false,"해설 먼저 보기");showExplain(null,null);updateStats()}});
$("againBtn").addEventListener("click",()=>render());
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{let m=t.dataset.mode;if(m==="learn")startLearn();if(m==="review")startReview();if(m==="similar")startSimilar();if(m==="generate")startGenerate();if(m==="exam")startExam(10);if(m==="note")showNotes()}));
startLearn();
</script>
</body>
</html>
